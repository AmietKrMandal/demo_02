<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out - Contact Details App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #d5bfff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #7b60ff;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .message {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .back-link {
            display: block;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Sign Out</h1>
        <p class="message">Are you sure you want to sign out?</p>

        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit">Sign Out</button>
        </form>
        <a href="{% url 'home' %}" class="back-link">&larr; Back to Contacts</a>
    </div>
</body>
</html>
